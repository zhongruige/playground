name: Smoke test release
on:
  release:
    types: [published]
jobs:
  testbed-setup:
    name: Setup test environment
    runs-on: ubuntu-18.04
    steps:
      - name: Create dirs.
        run: |
              mkdir -p code/woocommerce
              mkdir -p package/woocommerce
              mkdir -p tmp/woocommerce
              mkdir -p node_modules

      - name: Checkout code.
        run: |
          git clone https://github.com/woocommerce/woocommerce.git
          mv ./woocommerce/* ./package/woocommerce

      - name: Run npm install.
        working-directory: package/woocommerce
        run: npm install

      - name: Move current directory to code. We will install zip file in this dir later.
        run: mv ./package/woocommerce/* ./code/woocommerce

      - name: Download WooCommerce release zip
        working-directory: tmp
        run: |
          ASSET_ID=$(jq ".release.assets[0].id" $GITHUB_EVENT_PATH)

          curl https://api.github.com/repos/zhongruige/playground/releases/assets/${ASSET_ID} -LJOH 'Accept: application/octet-stream'

          unzip woocommerce.zip -d woocommerce
          mv woocommerce/* ../package/woocommerce/

      - name: Temporarily save environment
        uses: actions/upload-artifact@v2
        with:
          name: wc-artifact
          path: package/
          retention-days: 1

  test-wp:
    needs: testbed-setup
    name: Run smoke test on L-minus ${{ matrix.wp }} WordPress version
    runs-on: ubuntu-18.04
    strategy:
      matrix: 
        wp: [ '1', '2' ]
    steps:

      - name: Retrieve saved envrionment
        uses: actions/download-artifact@v2
        with:
          name: wc-artifact
          path: package/

      - name: Load docker images and start containers.
        working-directory: package/woocommerce
        env:
          LATEST_WP_VERSION_MINUS: ${{ matrix.wp }}
        run: npx wc-e2e docker:up

      - name: Run tests command.
        working-directory: code/woocommerce
        run: npx wc-e2e test:e2e
      
      - name: Stop containers
        run: npx wc-e2e docker:up
